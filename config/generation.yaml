dataset:
  recommended: "Consented personal portraits or a licensed portrait subset"
  reason: "The product direction is a professional AI photo studio, so evaluation should focus on identity preservation, skin realism, lighting, and portrait quality."
  fallback: "AFHQ v2 or consented product images when avoiding human-subject data."

generation:
  model_id: "runwayml/stable-diffusion-v1-5"
  image_size: 512
  num_inference_steps: 28
  device: "cuda"
  precision: "float16"
  notes: "Designed for an RTX 3060 Ti 8GB. API studio is the preferred production path when stronger, more distinct portrait edits are required."

variations:
  - label: "Natural lighting"
    prompt: "bright sunlit professional lifestyle portrait, high-key daylight flooding from one side, crisp white bounce fill, airy cream background with visible depth, same face, same identity, razor-sharp eyes, 85mm lens, clean but noticeable retouching"
    strength: 0.54
    guidance_scale: 8.2
    seed_offset: 1
  - label: "Cinematic tint"
    prompt: "bold low-key cinematic portrait, deep teal shadows and strong amber highlights, hard rim light, moody textured dark background, same face, same identity, realistic skin texture, sharp eyes, dramatic film still contrast"
    strength: 0.66
    guidance_scale: 9.0
    seed_offset: 2
  - label: "Studio headshot"
    prompt: "high-impact commercial studio headshot, bright dual softbox catchlights, pristine seamless gray backdrop, ultra-crisp business portrait framing, same face, same identity, confident natural expression, tack-sharp eyes, realistic skin"
    strength: 0.52
    guidance_scale: 8.6
    seed_offset: 3
  - label: "Editorial polish"
    prompt: "fashion magazine editorial portrait with strong directional key light, punchy refined contrast, deep sophisticated background separation, same face, same identity, realistic skin pores, sharp eyes, premium high-fashion color grading"
    strength: 0.68
    guidance_scale: 9.2
    seed_offset: 4
  - label: "Soft luxury retouch"
    prompt: "high-end beauty campaign portrait, soft clamshell lighting with glowing highlights, luminous polished skin while keeping natural texture, elegant warm champagne background, same face, same identity, no plastic skin, luxury campaign finish"
    strength: 0.58
    guidance_scale: 8.4
    seed_offset: 5
